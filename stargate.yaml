# ============================================================================
# ШАБЛОН STARGATE (Оптимизирован под Mikrotik hAP ac²)
# ============================================================================

allow-lan: true
mode: rule
log-level: warning
ipv6: true
unified-delay: true
external-controller: 0.0.0.0:9091
external-ui: ui
secret: B4hdg8YToq

profile:
  store-selected: true

# === ГЕОДАННЫЕ ===
geodata-mode: true
geox-url:
  geosite: "https://github.com/jameszeroX/zkeen-domains/releases/latest/download/zkeen.dat"
  geoip: "https://github.com/jameszeroX/zkeen-ip/releases/latest/download/zkeenip.dat"
geo-auto-update: true
geo-update-interval: 48

# === АНАЛИЗ ТРАФИКА ===
sniffer:
  enable: false

# === DNS НАСТРОЙКИ ===
dns:
  enable: true
  use-system-hosts: true
  nameserver:
    - system

# === СЛУШАТЕЛИ ===
listeners:
  - name: mixed-in
    type: mixed
    port: 1080
  - name: tun-in
    type: tun
    stack: system
    auto-detect-interface: true
    auto-route: true
    auto-redirect: true
    inet4-address:
    - 198.19.0.1/30

# === ПОДПИСКИ НА ПРОКСИ (ОПТИМИЗИРОВАНЫ) ===
proxy-providers:
  SUB1:
    type: http
    url: "https://subscribe.051ntlab.xyz/paqJ_Bn3bfTnqk9B"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
      timeout: 5000
      lazy: true
      expected-status: 204
    header:
      x-hwid: [2d94cfeeb18346afa254a3da3e3bbba4]
  SUB2:
    type: http
    url: "https://lv.mmlemeshev.online:2096/subs/4sv7vtzk98bqowif"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
      timeout: 5000
      lazy: true
      expected-status: 204
    header:
      x-hwid: [2d94cfeeb18346afa254a3da3e3bbba4]
  SUB3:
    type: http
    url: "https://de.mmlemeshev.online:2096/subs/fgoyl0g1gqsqs1ka"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
      timeout: 5000
      lazy: true
      expected-status: 204
    header:
      x-hwid: [2d94cfeeb18346afa254a3da3e3bbba4]

health_check: &health_check
  url: https://www.gstatic.com/generate_204
  interval: 600
  expected-status: 204

url_test: &url_test
  url: https://www.gstatic.com/generate_204
  interval: 600
  lazy: false
  expected-status: 204
  tolerance: 50

providers_list: &providers_list [SUB1, SUB2, SUB3]
proxy_list_all: &proxy_list_all [SELECTOR, AUTO, MANUAL, DIRECT]
proxy_list_youtube: &proxy_list_youtube [DIRECT, SELECTOR, AUTO, MANUAL]

# === ИКОНКИ ===
icon_telegram: &icon_telegram https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
icon_whatsapp: &icon_whatsapp https://github.com/OMchik33/Whatsapp-icon/blob/master/icons/whatsapp_194x194.png?raw=true
icon_direct: &icon_direct https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png
icon_facebook: &icon_facebook https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Facebook.png
icon_amazon: &icon_amazon https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Amazon.png
icon_global: &icon_global https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
icon_google: &icon_google https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google.png
icon_cloudflare: &icon_cloudflare https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cloudflare.png
icon_steam: &icon_steam https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Steam.png
icon_discord: &icon_discord https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png
icon_youtube: &icon_youtube https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
icon_twitch: &icon_twitch https://img.icons8.com/3d-fluency/94/twitch.png
icon_bot: &icon_bot https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Dark/Bot.png
icon_microsoft: &icon_microsoft https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Dark/Microsoft.png
icon_download: &icon_download https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Download.png
icon_media: &icon_media https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Media.png
icon_puzzle: &icon_puzzle https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Puzzle.png

# === ШАБЛОНЫ ПРАВИЛ ===
rule_provider_base: &rule_provider_base {type: http, interval: 86400}
rule_behavior_domain_mrs: &rule_behavior_domain_mrs {<<: *rule_provider_base, behavior: domain, format: mrs}
rule_behavior_ipcidr_mrs: &rule_behavior_ipcidr_mrs {<<: *rule_provider_base, behavior: ipcidr, format: mrs}
rule_behavior_classical_mrs: &rule_behavior_classical_mrs {<<: *rule_provider_base, behavior: classical, format: mrs}

# === ГРУППЫ ПРОКСИ ===
proxy-groups:
  - {name: SELECTOR, type: select, include-all: true, proxies: [AUTO, MANUAL, DIRECT]}
  - {name: AUTO, type: fallback, proxies: [FASTEST, FAILOVER, MANUAL, DIRECT], <<: *health_check}
  - {name: FASTEST, type: url-test, use: *providers_list, <<: *url_test}
  - {name: FAILOVER, type: fallback, use: *providers_list, <<: *health_check}
  - {name: MANUAL, type: select, use: *providers_list}
  - {name: GLOBAL, type: select, hidden: true, icon: *icon_global, proxies: *proxy_list_all}
  - {name: QUIC, type: select, proxies: [REJECT, PASS]}
  - {name: Telegram, type: select, icon: *icon_telegram, proxies: *proxy_list_all}
  - {name: WhatsApp, type: select, icon: *icon_whatsapp, proxies: *proxy_list_all}
  - {name: ECH-Refilter, type: select, icon: *icon_direct, proxies: *proxy_list_all}
  - {name: META, type: select, icon: *icon_facebook, proxies: *proxy_list_all}
  - {name: CDN, type: select, icon: *icon_global, proxies: *proxy_list_all}
  - {name: VPS & Облака, type: select, icon: *icon_global, proxies: *proxy_list_all}
  - {name: MEGA, type: select, icon: *icon_global, proxies: *proxy_list_all}
  - {name: Steam, type: select, icon: *icon_steam, proxies: *proxy_list_all}
  - {name: Discord, type: select, icon: *icon_discord, proxies: *proxy_list_all}
  - {name: YouTube, type: select, icon: *icon_youtube, proxies: *proxy_list_youtube}
  - {name: Twitch, type: select, icon: *icon_twitch, proxies: *proxy_list_all}
  - {name: AI & Разработка, type: select, icon: *icon_bot, proxies: *proxy_list_all}
  - {name: Microsoft, type: select, icon: *icon_microsoft, proxies: *proxy_list_all}
  - {name: Torrent-Traffic, type: select, icon: *icon_download, proxies: *proxy_list_all}
  - {name: Politic-Domains, type: select, icon: *icon_media, proxies: *proxy_list_all}
  - {name: Other-Domains, type: select, icon: *icon_puzzle, proxies: *proxy_list_all}

# === ВНЕШНИЕ НАБОРЫ ПРАВИЛ ===
rule-providers:
  telegram-domains: {<<: *rule_behavior_domain_mrs, url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/telegram.mrs", path: ./rule-sets/telegram-domains.mrs}
  telegram-ips: {<<: *rule_behavior_ipcidr_mrs, url: "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs", path: ./rule-sets/telegram-ips.mrs}
  whatsapp-domains: {<<: *rule_behavior_domain_mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/whatsapp.mrs", path: ./rule-sets/whatsapp-domains.mrs}
